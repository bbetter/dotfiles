# ============================
# LOOK & FEEL (Hyprland 0.53 FINAL + Validated)
# ============================

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 3

    col.active_border = rgba(c39e74ff) rgba(d2b898ff) 45deg
    col.inactive_border = rgba(21170fff)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(c39e74ee)
        color_inactive = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 3
        passes = 1
    }
}

group {
    col.border_active = rgba(c39e74ff) rgba(d2b898ff) 45deg
    col.border_inactive = rgba(21170fff)
    
    groupbar {
        col.active = rgba(c39e74ff)
        col.inactive = rgba(21170fff)
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = windows,     1, 4.5, easeOutQuint
    animation = fade,        1, 2.0, quick
    animation = workspaces,  1, 2.2, easeInOutCubic
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = true
}

source = ~/.config/theme/hyprland-colors.conf
