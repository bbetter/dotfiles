# ======================================================================================
# HYPRLAND CONSOLIDATED CONFIG (mrk version)
# ======================================================================================

# ============================
# ENVIRONMENT
# ============================
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
# env = QT_QPA_PLATFORMTHEME,qt6ct # Uncomment if qt6ct is installed
env = HYPRCURSOR_SIZE,24

# ============================
# MONITORS
# ============================
# monitor = MONITOR_NAME_1, preferred, 0x0, 1
# monitor = MONITOR_NAME_2, preferred, 1920x0, 1, transform, 1 # Vertical (90 deg)

# Fallback/Default
monitor = ,preferred,auto,1

# ============================
# WORKSPACE MONITOR BINDING
# ============================
# bind workspaces 1-5 to first monitor, 6-10 to second
# workspace = 1, monitor:MONITOR_NAME_1
# workspace = 6, monitor:MONITOR_NAME_2

# ============================
# APPLICATIONS (Simplified)
# ============================
$terminal = kitty
$menu = fuzzel
$fileManager = thunar

# ============================
# AUTOSTART
# ============================
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# exec-once = hyprpm reload -n # Uncomment if using plugins
# exec-once = wl-paste --watch cliphist store
# exec-once = swaync
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ============================
# INPUT
# ============================
input {
    kb_layout = us,ua
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0
}

gesture = 3, horizontal, workspace

# ============================
# LOOK & FEEL
# ============================
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 3

    col.active_border = rgba(c39e74ff) rgba(d2b898ff) 45deg
    col.inactive_border = rgba(21170fff)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 8

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(c39e74ee)
        color_inactive = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 3
        passes = 1
    }
}

group {
    col.border_active = rgba(c39e74ff) rgba(d2b898ff) 45deg
    col.border_inactive = rgba(21170fff)
    
    groupbar {
        col.active = rgba(c39e74ff)
        col.inactive = rgba(21170fff)
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = windows,     1, 4.5, easeOutQuint
    animation = fade,        1, 2.0, quick
    animation = workspaces,  1, 2.2, easeInOutCubic
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true
    vrr = true
}

# ============================
# WINDOW RULES
# ============================
windowrule = suppress_event maximize, match:class .*

# Screen sharing
windowrule = no_blur on, match:class ^(xdg-desktop-portal-hyprland)$
windowrule = no_anim on, match:class ^(xdg-desktop-portal-hyprland)$

# Picture-in-Picture
windowrule = float on , match:title ^(Picture-in-Picture)$
windowrule = pin on , match:title ^(Picture-in-Picture)$
windowrule = size 25% 25%, match:title ^(Picture-in-Picture)$

# File pickers
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$

# Password prompts
windowrule = float on, match:class ^(polkit-.*)$
windowrule = center on, match:class ^(polkit-.*)$

# ==================================================
# KEYBINDS
# ==================================================
$mainMod = SUPER

# SYSTEM / SESSION
# bind = $mainMod SHIFT, L, exec, swaylock
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exit

# LAUNCHERS
bind = $mainMod, SPACE, exec, $menu # Application menu
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager

# WINDOW NAVIGATION
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, l,     movefocus, r
bind = $mainMod, j,     movefocus, d
bind = $mainMod, k,     movefocus, u

# MOVE WINDOWS
bind = $mainMod SHIFT, left,  swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up,    swapwindow, u
bind = $mainMod SHIFT, down,  swapwindow, d
bind = $mainMod SHIFT, h,     swapwindow, l
bind = $mainMod SHIFT, l,     swapwindow, r
bind = $mainMod SHIFT, j,     swapwindow, d
bind = $mainMod SHIFT, k,     swapwindow, u

# RESIZE WINDOWS
bind = $mainMod CTRL, left,  resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up,    resizeactive, 0 -40
bind = $mainMod CTRL, down,  resizeactive, 0 40

# TOGGLE FLOATING / FULLSCREEN
bind = $mainMod, F, togglefloating
bind = $mainMod SHIFT, F, fullscreen

# WORKSPACES
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# SCROLL WORKSPACES
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# MOUSE BINDS
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
